name: v0.4.0.post1 final replacement audit

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/v040-post1-final-asset-audit.yml
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v0.4.0.post1
          fetch-depth: 0
          clean: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download final published assets and metadata
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-list -n 1 v0.4.0.post1)" = "ab29544a6c2d606a63cab769c7368ac2019439ff"
          test "$(git rev-parse HEAD)" = "ab29544a6c2d606a63cab769c7368ac2019439ff"
          git clean -ffdx
          mkdir -p final-published
          gh release download v0.4.0.post1 \
            --pattern 'embodied-alife-update.zip' \
            --pattern 'embodied-alife-update.zip.sha256' \
            --dir final-published --clobber
          gh api repos/eWOOD29/embodied-alife/releases/358927957 > release-by-id.json
          gh api repos/eWOOD29/embodied-alife/releases/latest > latest-release.json
          git fetch origin main --depth=1
          git ls-tree -r --name-only origin/main > main-members.txt

      - name: Audit final published bytes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import hashlib, json, re, tomllib, zipfile
          from pathlib import Path

          stale_zip_digest = '14eee8817266c13893f4f176f0c4563ab82c1f16204d24fa700efc66bee21a2a'
          stale_zip_size = 167125
          root = Path('final-published')
          zp = root / 'embodied-alife-update.zip'
          cp = root / 'embodied-alife-update.zip.sha256'
          checksum_text = cp.read_text(encoding='utf-8')
          m = re.fullmatch(r'([0-9a-f]{64})  (embodied-alife-update\.zip)\n', checksum_text)
          assert m, checksum_text
          checksum_digest, checksum_filename = m.groups()
          computed = hashlib.sha256(zp.read_bytes()).hexdigest()
          assert computed == checksum_digest
          assert computed != stale_zip_digest
          assert zp.stat().st_size != stale_zip_size

          release = json.loads(Path('release-by-id.json').read_text(encoding='utf-8'))
          latest = json.loads(Path('latest-release.json').read_text(encoding='utf-8'))
          assert release['id'] == 358927957
          assert release['tag_name'] == latest['tag_name'] == 'v0.4.0.post1'
          assert release['draft'] is latest['draft'] is False
          assert release['prerelease'] is latest['prerelease'] is False
          wanted = {'embodied-alife-update.zip', 'embodied-alife-update.zip.sha256'}
          assets = {a['name']: a for a in release['assets'] if a['name'] in wanted}
          latest_assets = {a['name']: a for a in latest['assets'] if a['name'] in wanted}
          assert set(assets) == set(latest_assets) == wanted
          assert {n: assets[n]['id'] for n in wanted} == {n: latest_assets[n]['id'] for n in wanted}
          assert assets['embodied-alife-update.zip']['size'] == zp.stat().st_size
          assert assets['embodied-alife-update.zip.sha256']['size'] == cp.stat().st_size
          if assets['embodied-alife-update.zip'].get('digest'):
              assert assets['embodied-alife-update.zip']['digest'] == f'sha256:{computed}'

          with zipfile.ZipFile(zp) as z:
              assert z.testzip() is None
              names = z.namelist()
              assert len(names) == len(set(names))
              manifest = json.loads(z.read('update-manifest.json'))
              assert manifest['app_id'] == 'embodied-alife'
              assert manifest['version'] == '0.4.0.post1'
              assert manifest['preserved_roots'] == ['.env', '.venv', 'data', '.git']
              managed = manifest['managed_paths']
              assert sorted(managed) == sorted(n for n in names if n != 'update-manifest.json')
              assert set(names) == set(managed) | {'update-manifest.json'}
              required = {
                  'app/simulation/actions.py','app/simulation/agent.py','app/simulation/cognition.py',
                  'app/simulation/perception.py','app/simulation/scheduler.py',
                  'tests/test_v040_cognitive_foundations.py','tests/test_v040_remediation.py',
                  'docs/COGNITIVE_STATE.md','CHANGELOG.md','pyproject.toml','app/version.py'
              }
              assert required <= set(names)
              assert 'post1-test-output.txt' not in names

              forbidden_name_patterns = [
                  r'(^|/)(?:post1|remediation|audit|ci|test)[-_].*output.*\.txt$',
                  r'(^|/).*?(?:audit|diagnostic|applicator).*\.(?:txt|json|log|zip)$',
                  r'(^|/)scripts/(?:apply|finalize|restore)_v040',
                  r'(^|/)\.github/workflows/(?:v040|remediation|restore-v040|final-audit|republish)',
                  r'(^|/)(?:__pycache__|\.pytest_cache|\.ruff_cache)(/|$)',
                  r'(^|/).*\.(?:db|sqlite|sqlite3|pyc|log)$',
              ]
              forbidden_names = [n for n in names if any(re.search(p, n, re.I) for p in forbidden_name_patterns)]
              assert not forbidden_names, forbidden_names
              allowed_root = {'.env.example','.gitignore','CHANGELOG.md','README.md','WINDOWS_SETUP.md','appdock.json','install-windows.ps1','pyproject.toml','start-embodied-alife.bat','start.sh','update-manifest.json'}
              unexpected_root = [n for n in names if '/' not in n and n not in allowed_root]
              assert not unexpected_root, unexpected_root

              pv = tomllib.loads(z.read('pyproject.toml').decode())['project']['version']
              vm = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', z.read('app/version.py').decode())
              assert vm and vm.group(1) == pv == '0.4.0.post1'

              privacy_patterns = {
                  'private_drive_url': re.compile(r'https://(?:docs|drive)\.google\.com/', re.I),
                  'windows_user_path': re.compile(r'[A-Za-z]:\\Users\\[^\\\s]+', re.I),
                  'private_unix_home': re.compile(r'/(?:home|Users)/(?:ethan|ewood29)(?:/|\\)', re.I),
                  'private_tailnet': re.compile(r'(?:ethan-pc|tailce5cf1|100\.110\.245\.119)', re.I),
                  'credential': re.compile(r'\b(?:sk-[A-Za-z0-9_-]{20,}|gh[pousr]_[A-Za-z0-9]{20,})\b'),
                  'assistant_system': re.compile(r'Ethan Assistant System|Knowledge Vault|SKILL-PROJ-001', re.I),
              }
              content_hits = []
              for name in names:
                  if name == 'update-manifest.json' or name.endswith(('.png','.jpg','.jpeg','.gif','.ico','.zip')):
                      continue
                  try: text = z.read(name).decode('utf-8')
                  except (UnicodeDecodeError, KeyError): continue
                  for label, pattern in privacy_patterns.items():
                      if pattern.search(text): content_hits.append({'path': name, 'pattern': label})
              assert not content_hits, content_hits
              Path('archive-members.txt').write_text('\n'.join(names) + '\n', encoding='utf-8')

          main_names = Path('main-members.txt').read_text(encoding='utf-8').splitlines()
          main_forbidden = [n for n in main_names if re.search(r'(^|/)(?:post1-test-output|remediation-.*output|.*audit.*report|scripts/(?:apply|finalize|restore)_v040|\.github/workflows/(?:v040|remediation|restore-v040|final-audit|republish))', n, re.I)]
          assert not main_forbidden, main_forbidden

          evidence = {
              'version':'0.4.0.post1','tag':'v0.4.0.post1','tag_target':'ab29544a6c2d606a63cab769c7368ac2019439ff',
              'release_id':release['id'],'release_name':release['name'],'published_at':release['published_at'],
              'draft':release['draft'],'prerelease':release['prerelease'],
              'zip_asset':{k:assets['embodied-alife-update.zip'].get(k) for k in ('id','name','size','created_at','updated_at','digest','browser_download_url')},
              'checksum_asset':{k:assets['embodied-alife-update.zip.sha256'].get(k) for k in ('id','name','size','created_at','updated_at','digest','browser_download_url')},
              'checksum_file_contents':checksum_text,'computed_zip_sha256':computed,'checksum_filename':checksum_filename,
              'checksum_match':True,'zip_integrity':True,'entry_count':len(names),'manifest_path':'update-manifest.json',
              'manifest':manifest,'managed_path_reconciliation':True,'corrected_files_present':True,
              'package_runtime_versions_synchronized':True,'post1_test_output_absent':True,'other_temporary_files_absent':True,
              'privacy_hygiene_scan':True,'unexpected_root_level_members':[],'main_clean':True,
              'temporary_workflows_absent_from_main':True,'temporary_reports_absent_from_main':True,'temporary_applicators_absent_from_main':True,
              'latest_release_id':latest['id'],'latest_tag':latest['tag_name'],
              'latest_zip_url_exposed':bool(latest_assets['embodied-alife-update.zip']['browser_download_url']),
              'latest_checksum_url_exposed':bool(latest_assets['embodied-alife-update.zip.sha256']['browser_download_url']),
              'latest_asset_ids_match_release':True,'replacement_proven_by_changed_digest_and_size':True
          }
          Path('a12-final-evidence.json').write_text(json.dumps(evidence, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Upload durable external evidence
        uses: actions/upload-artifact@v4
        with:
          name: v040-post1-final-a12-evidence
          path: |
            a12-final-evidence.json
            archive-members.txt
            release-by-id.json
            latest-release.json
            final-published/embodied-alife-update.zip
            final-published/embodied-alife-update.zip.sha256
          retention-days: 90

      - name: Delete temporary cleanup branch
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh api -X DELETE repos/eWOOD29/embodied-alife/git/refs/heads/operations/v040-post1-package-cleanup
