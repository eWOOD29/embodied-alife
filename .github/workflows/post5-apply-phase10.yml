name: post5-apply-phase10

on:
  push:
    branches: [remediation/v0.4.0-post5]
    paths:
      - scripts/post5_apply_phase10.py
      - .github/workflows/post5-apply-phase10.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post5
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python scripts/post5_apply_phase10.py
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/serialization.py app/simulation/cognition.py tests/test_diagnostics_v2.py tests/test_v040_cognitive_foundations.py
          git commit -m "Close remaining post5 regression defects" || exit 0
          git push origin HEAD:remediation/v0.4.0-post5
