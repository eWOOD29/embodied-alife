name: post5-apply-phase10

on:
  push:
    branches:
      - remediation/v0.4.0-post5
    paths:
      - scripts/post5_apply_phase10.py
      - .github/workflows/post5-apply-phase10.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post5
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Apply and capture phase 10
        shell: bash
        run: |
          set +e
          python scripts/post5_apply_phase10.py > post5-phase10-output.txt 2>&1
          echo "exit=$?" >> post5-phase10-output.txt
          cat post5-phase10-output.txt
          exit 0
      - name: Commit phase 10 or its diagnosis
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/serialization.py app/simulation/cognition.py tests/test_diagnostics_v2.py tests/test_v040_cognitive_foundations.py post5-phase10-output.txt
          git commit -m "Apply or diagnose post5 phase 10" || exit 0
          git push origin HEAD:remediation/v0.4.0-post5
