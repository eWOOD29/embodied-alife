name: post3-release-audit

on:
  push:
    branches: [main]
    paths: ['.github/workflows/post3-release-audit.yml']

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Download published release metadata and assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf post3-audit
          mkdir post3-audit
          gh api repos/${{ github.repository }}/releases/tags/v0.4.0.post3 > post3-audit/release.json
          gh api repos/${{ github.repository }}/releases/latest > post3-audit/latest.json
          gh release download v0.4.0.post3 --dir post3-audit --pattern 'embodied-alife-update.zip*'
      - name: Audit published bytes
        run: |
          python - <<'PY'
          from pathlib import Path, PurePosixPath
          import hashlib, json, re, zipfile

          root = Path('post3-audit')
          release = json.loads((root/'release.json').read_text())
          latest = json.loads((root/'latest.json').read_text())
          zpath = root/'embodied-alife-update.zip'
          cpath = root/'embodied-alife-update.zip.sha256'
          checksum_text = cpath.read_text(encoding='utf-8')
          checksum_lines = checksum_text.splitlines()
          m = re.fullmatch(r'([0-9a-fA-F]{64})  embodied-alife-update\.zip\n?', checksum_text)
          declared = m.group(1).lower() if m else None
          computed = hashlib.sha256(zpath.read_bytes()).hexdigest()
          assets = {a['name']: a for a in release.get('assets', [])}
          zip_asset = assets.get('embodied-alife-update.zip')
          sum_asset = assets.get('embodied-alife-update.zip.sha256')
          github_digest = (zip_asset or {}).get('digest')
          github_hex = github_digest.split(':',1)[1].lower() if isinstance(github_digest,str) and github_digest.startswith('sha256:') else None
          tag_target = __import__('subprocess').check_output(['git','rev-list','-n','1','v0.4.0.post3'], text=True).strip()

          forbidden_name_terms = (
            'post3-final-test-output','post3-preedit-audit','release-audit','validation-output','test-output',
            'applicator','remote-edit','trigger','branch-cleanup','__pycache__','.pytest_cache','.ruff_cache'
          )
          forbidden_exts = ('.pyc','.pyo','.sqlite','.sqlite3','.db','.log')
          forbidden_content = (
            'c:\\users\\','/home/runner/','/users/ethan/','docs.google.com/document/d/',
            'ethan assistant system','tailce5cf1','private project-lead','project-lead ruling',
            'post3-final-test-output','post3-preedit-audit','sk-','ghp_','github_pat_'
          )
          expected_roots = {'.github','app','scripts','tests','CHANGELOG.md','LICENSE','README.md','install-windows.ps1','pyproject.toml','update-manifest.json'}

          with zipfile.ZipFile(zpath) as archive:
            names = archive.namelist()
            corrupt = archive.testzip()
            duplicates = sorted({n for n in names if names.count(n) > 1})
            unsafe=[]
            unexpected_roots=[]
            bad_names=[]
            readable=[]
            bad_content=[]
            for name in names:
              p=PurePosixPath(name)
              if name.startswith('/') or '\\' in name or '..' in p.parts or (p.parts and re.fullmatch(r'[A-Za-z]:',p.parts[0])):
                unsafe.append(name)
              root_name=p.parts[0] if p.parts else ''
              if root_name not in expected_roots:
                unexpected_roots.append(name)
              low=name.lower()
              if any(t in low for t in forbidden_name_terms) or low.endswith(forbidden_exts) or low=='.env':
                bad_names.append(name)
              info=archive.getinfo(name)
              if name.endswith('/') or info.file_size > 3_000_000:
                continue
              try: text=archive.read(name).decode('utf-8')
              except Exception: continue
              readable.append(name)
              low_text=text.lower()
              for marker in forbidden_content:
                if marker.lower() in low_text:
                  bad_content.append({'member':name,'marker':marker})
            manifest=json.loads(archive.read('update-manifest.json'))
            app_version=archive.read('app/version.py').decode('utf-8')
            pyproject=archive.read('pyproject.toml').decode('utf-8')
            changelog=archive.read('CHANGELOG.md').decode('utf-8')
            perception=archive.read('app/simulation/perception.py').decode('utf-8')
            actions=archive.read('app/simulation/actions.py').decode('utf-8')
            post3_tests=[n for n in names if n.startswith('tests/test_v040_post3')]

          packaged_files=sorted(n for n in names if not n.endswith('/') and n!='update-manifest.json')
          managed=sorted(manifest.get('managed_paths',[]))
          latest_assets={a['name']:a for a in latest.get('assets',[])}
          result={
            'tag_target':tag_target,
            'release':release,
            'latest':latest,
            'zip_asset':zip_asset,
            'checksum_asset':sum_asset,
            'zip_size_downloaded':zpath.stat().st_size,
            'checksum_size_downloaded':cpath.stat().st_size,
            'checksum_contents':checksum_text,
            'checksum_line_count':len(checksum_lines),
            'checksum_strict_syntax':bool(m),
            'declared_sha256':declared,
            'computed_sha256':computed,
            'github_digest':github_digest,
            'declared_matches_computed':declared==computed,
            'github_matches_computed':github_hex in (None,computed),
            'integrity_pass':corrupt is None,
            'corrupt_member':corrupt,
            'member_count':len(names),
            'members':names,
            'duplicate_members':duplicates,
            'unsafe_paths':unsafe,
            'unexpected_root_members':unexpected_roots,
            'manifest_count':names.count('update-manifest.json'),
            'manifest':manifest,
            'packaged_files':packaged_files,
            'managed_paths':managed,
            'managed_paths_match':managed==packaged_files,
            'missing_managed_paths':sorted(set(managed)-set(packaged_files)),
            'unmanaged_packaged_files':sorted(set(packaged_files)-set(managed)),
            'readable_member_count':len(readable),
            'forbidden_names':bad_names,
            'forbidden_content_hits':bad_content,
            'freshness':{
              'app_version_post3':'0.4.0.post3' in app_version,
              'pyproject_post3':bool(re.search(r'version\s*=\s*[\"\']0\.4\.0\.post3[\"\']',pyproject)),
              'changelog_post3':'0.4.0.post3' in changelog,
              'normalized_satiety':'100.0 - hunger_deficit' in perception and '100.0 - agent.hunger' not in perception,
              'raw_task_to_dict_absent':'task.to_dict() for task' not in actions,
              'raw_note_to_dict_absent':'note.to_dict() for note' not in actions,
              'task_projection':'def _ari_task_projection' in actions,
              'note_projection':'def _ari_note_projection' in actions,
              'map_cell_64':'ARI_MAP_CELL_LIMIT = 64' in actions,
              'map_marker_32':'ARI_MAP_MARKER_LIMIT = 32' in actions,
              'task_32':'ARI_TASK_LIMIT = 32' in actions,
              'note_24':'ARI_NOTE_LIMIT = 24' in actions,
              'marker_projection':'def _ari_marker_projection' in actions,
              'post3_tests':post3_tests,
            },
            'latest_asset_ids':{k:v.get('id') for k,v in latest_assets.items()},
          }
          required_checks=[
            tag_target=='a27f86c6576bb960428e65f7d6d56c227a40c489',
            release.get('tag_name')=='v0.4.0.post3', not release.get('draft'), not release.get('prerelease'),
            bool(zip_asset), bool(sum_asset), latest.get('tag_name')=='v0.4.0.post3',
            bool(m), declared==computed, github_hex in (None,computed), corrupt is None,
            not duplicates, not unsafe, not unexpected_roots, names.count('update-manifest.json')==1,
            manifest.get('schema_version')==1, manifest.get('app_id')=='embodied-alife', manifest.get('version')=='0.4.0.post3',
            manifest.get('preserved_roots')==['.env','.venv','data','.git'], managed==packaged_files,
            not bad_names, not bad_content, all(v if not isinstance(v,list) else bool(v) for v in result['freshness'].values()),
            (zip_asset or {}).get('id')==(latest_assets.get('embodied-alife-update.zip') or {}).get('id'),
            (sum_asset or {}).get('id')==(latest_assets.get('embodied-alife-update.zip.sha256') or {}).get('id'),
          ]
          result['verdict']='PASS' if all(required_checks) else 'FAIL'
          Path('post3-release-audit.json').write_text(json.dumps(result,indent=2,sort_keys=True)+'\n',encoding='utf-8')
          Path('post3-release-members.txt').write_text('\n'.join(names)+'\n',encoding='utf-8')
          if result['verdict']!='PASS':
            raise SystemExit('published release audit failed')
          PY
      - name: Upload durable evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: post3-release-audit-evidence
          path: |
            post3-release-audit.json
            post3-release-members.txt
          retention-days: 90
      - name: Commit retrievable evidence
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add post3-release-audit.json post3-release-members.txt
          git commit -m 'Capture post3 published release audit evidence'
          git push origin main
