name: Apply v0.4.0 remediation

on:
  push:
    branches:
      - remediation/v0.4.0-post1
    paths:
      - scripts/apply_v040_remediation.py
      - .github/workflows/remediation-apply.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: remediation/v0.4.0-post1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply source remediation
        run: python scripts/apply_v040_remediation.py
      - name: Compile touched source
        run: python -m compileall -q app
      - name: Commit applied remediation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app
          git commit -m "Remediate v0.4.0 acceptance defects"
          git push origin HEAD:remediation/v0.4.0-post1
