name: Restore v0.4.0 changelog history

on:
  push:
    branches:
      - fix/restore-v040-changelog
    paths:
      - scripts/restore_v040_changelog.py
      - .github/workflows/restore-v040-changelog.yml

permissions:
  contents: write

jobs:
  restore:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/restore-v040-changelog
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python scripts/restore_v040_changelog.py
      - run: |
          test "$(grep -c '^## \[0.3.3\]' CHANGELOG.md)" = 1
          test "$(grep -c '^## \[0.2.7\]' CHANGELOG.md)" = 1
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CHANGELOG.md
          git commit -m "Restore complete changelog history"
          git push origin HEAD:fix/restore-v040-changelog
# trigger
