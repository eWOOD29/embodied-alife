name: post4-debug

on:
  pull_request:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install -e '.[dev]'
      - name: Capture test output
        shell: bash
        run: |
          set +e
          python -m pytest -q > post4-debug-output.txt 2>&1
          code=$?
          echo "$code" > post4-debug-exit.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: post4-debug-output
          path: |
            post4-debug-output.txt
            post4-debug-exit.txt
