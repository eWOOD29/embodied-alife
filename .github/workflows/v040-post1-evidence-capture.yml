name: v0.4.0.post1 A12 evidence capture

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/v040-post1-evidence-capture.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v0.4.0.post1
          fetch-depth: 0
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Download assets and metadata
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p final-published
          gh release download v0.4.0.post1 --pattern 'embodied-alife-update.zip' --pattern 'embodied-alife-update.zip.sha256' --dir final-published --clobber
          gh api repos/eWOOD29/embodied-alife/releases/358927957 > release-by-id.json
          gh api repos/eWOOD29/embodied-alife/releases/latest > latest-release.json
          git fetch origin main --depth=1
          git ls-tree -r --name-only origin/main > main-members.txt
      - name: Capture all audit results
        shell: bash
        run: |
          python - <<'PY'
          import hashlib, json, re, tomllib, zipfile
          from pathlib import Path
          out = {'errors': []}
          try:
              zp = Path('final-published/embodied-alife-update.zip')
              cp = Path('final-published/embodied-alife-update.zip.sha256')
              checksum_text = cp.read_text(encoding='utf-8')
              m = re.fullmatch(r'([0-9a-f]{64})  (embodied-alife-update\.zip)\n', checksum_text)
              computed = hashlib.sha256(zp.read_bytes()).hexdigest()
              release = json.loads(Path('release-by-id.json').read_text())
              latest = json.loads(Path('latest-release.json').read_text())
              assets = {a['name']: a for a in release['assets'] if a['name'] in {'embodied-alife-update.zip','embodied-alife-update.zip.sha256'}}
              latest_assets = {a['name']: a for a in latest['assets'] if a['name'] in assets}
              with zipfile.ZipFile(zp) as z:
                  names = z.namelist()
                  manifest = json.loads(z.read('update-manifest.json'))
                  forbidden_name_patterns = [
                      r'(^|/)(?:post1|remediation|audit|ci|test)[-_].*output.*\.txt$',
                      r'(^|/).*?(?:audit|diagnostic|applicator).*\.(?:txt|json|log|zip)$',
                      r'(^|/)scripts/(?:apply|finalize|restore)_v040',
                      r'(^|/)\.github/workflows/(?:v040|remediation|restore-v040|final-audit|republish)',
                      r'(^|/)(?:__pycache__|\.pytest_cache|\.ruff_cache)(/|$)',
                      r'(^|/).*\.(?:db|sqlite|sqlite3|pyc|log)$',
                  ]
                  forbidden_names = [n for n in names if any(re.search(p,n,re.I) for p in forbidden_name_patterns)]
                  allowed_root = {'.env.example','.gitignore','CHANGELOG.md','README.md','WINDOWS_SETUP.md','appdock.json','install-windows.ps1','pyproject.toml','start-embodied-alife.bat','start.sh','update-manifest.json'}
                  unexpected_root = [n for n in names if '/' not in n and n not in allowed_root]
                  privacy_patterns = {
                      'private_drive_url': re.compile(r'https://(?:docs|drive)\.google\.com/', re.I),
                      'windows_user_path': re.compile(r'[A-Za-z]:\\Users\\[^\\\s]+', re.I),
                      'private_unix_home': re.compile(r'/(?:home|Users)/(?:ethan|ewood29)(?:/|\\)', re.I),
                      'private_tailnet': re.compile(r'(?:ethan-pc|tailce5cf1|100\.110\.245\.119)', re.I),
                      'credential': re.compile(r'\b(?:sk-[A-Za-z0-9_-]{20,}|gh[pousr]_[A-Za-z0-9]{20,})\b'),
                      'assistant_system': re.compile(r'Ethan Assistant System|Knowledge Vault|SKILL-PROJ-001', re.I),
                  }
                  hits=[]
                  for name in names:
                      if name == 'update-manifest.json' or name.endswith(('.png','.jpg','.jpeg','.gif','.ico','.zip')): continue
                      try: text=z.read(name).decode('utf-8')
                      except Exception: continue
                      for label,p in privacy_patterns.items():
                          if p.search(text): hits.append({'path':name,'pattern':label})
                  pv=tomllib.loads(z.read('pyproject.toml').decode())['project']['version']
                  vm=re.search(r'__version__\s*=\s*["\']([^"\']+)["\']',z.read('app/version.py').decode())
                  required={'app/simulation/actions.py','app/simulation/agent.py','app/simulation/cognition.py','app/simulation/perception.py','app/simulation/scheduler.py','tests/test_v040_cognitive_foundations.py','tests/test_v040_remediation.py','docs/COGNITIVE_STATE.md','CHANGELOG.md','pyproject.toml','app/version.py'}
                  Path('archive-members.txt').write_text('\n'.join(names)+'\n')
              main_names=Path('main-members.txt').read_text().splitlines()
              main_forbidden=[n for n in main_names if re.search(r'(^|/)(?:post1-test-output|remediation-.*output|.*audit.*report|scripts/(?:apply|finalize|restore)_v040|\.github/workflows/(?:v040|remediation|restore-v040|final-audit|republish))',n,re.I)]
              out.update({
                  'tag_target': 'ab29544a6c2d606a63cab769c7368ac2019439ff',
                  'release': release, 'latest_release': latest,
                  'checksum_file_contents': checksum_text, 'checksum_syntax_ok': bool(m),
                  'checksum_filename': m.group(2) if m else None,
                  'computed_zip_sha256': computed, 'checksum_match': bool(m and m.group(1)==computed),
                  'zip_integrity': zipfile.ZipFile(zp).testzip() is None,
                  'entry_count': len(names), 'manifest': manifest,
                  'managed_reconciles': sorted(manifest['managed_paths'])==sorted(n for n in names if n!='update-manifest.json'),
                  'preserved_roots_ok': manifest['preserved_roots']==['.env','.venv','data','.git'],
                  'required_files_present': required <= set(names),
                  'package_version': pv, 'runtime_version': vm.group(1) if vm else None,
                  'post1_test_output_absent': 'post1-test-output.txt' not in names,
                  'forbidden_names': forbidden_names, 'privacy_hits': hits,
                  'unexpected_root': unexpected_root, 'main_forbidden': main_forbidden,
                  'replacement_changed_from_stale': computed!='14eee8817266c13893f4f176f0c4563ab82c1f16204d24fa700efc66bee21a2a' and zp.stat().st_size!=167125,
                  'asset_summary': {k:{x:v.get(x) for x in ('id','name','size','created_at','updated_at','digest','browser_download_url')} for k,v in assets.items()},
                  'latest_asset_ids': {k:v['id'] for k,v in latest_assets.items()},
              })
          except Exception as exc:
              out['errors'].append(repr(exc))
          Path('a12-captured-evidence.json').write_text(json.dumps(out,indent=2)+'\n')
          PY
      - name: Upload evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v040-post1-a12-captured-evidence
          path: |
            a12-captured-evidence.json
            archive-members.txt
            release-by-id.json
            latest-release.json
            final-published/embodied-alife-update.zip
            final-published/embodied-alife-update.zip.sha256
          retention-days: 90
