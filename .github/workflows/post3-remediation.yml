name: post3-remediation

on:
  push:
    branches:
      - remediation/v0.4.0-post3

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e '.[dev]'
      - name: Apply remediation
        run: python scripts/apply_post3_remediation.py
      - name: Focused tests
        run: python -m pytest -q tests/test_v040_post3_remediation.py tests/test_v040_remediation.py
      - name: Full tests
        run: python -m pytest -q
      - name: Compile
        run: python -m compileall -q app tests scripts
      - name: Clean generated validation files
        run: |
          find app tests scripts -type d -name __pycache__ -prune -exec rm -rf {} +
          rm -rf .pytest_cache .ruff_cache
          find data/runtime -maxdepth 1 -type f ! -name .gitkeep -delete
      - name: Validate package
        run: python scripts/validate_package.py
      - name: Remove temporary applicator and workflow
        run: rm scripts/apply_post3_remediation.py .github/workflows/post3-remediation.yml
      - name: Commit clean tested candidate
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Implement bounded post3 cognition projections'
          git push origin HEAD:remediation/v0.4.0-post3
