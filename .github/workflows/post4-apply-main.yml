name: post4-apply-main

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/post4-apply-main.yml

permissions:
  contents: write

jobs:
  apply-and-clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post4
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Apply candidate to remediation branch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, gzip, re
          from pathlib import Path
          workflow = Path('.github/workflows/post4-apply.yml').read_text(encoding='utf-8')
          match = re.search(r'^\s*PAYLOAD:\s*(\S+)\s*$', workflow, re.MULTILINE)
          if not match:
              raise SystemExit('post4 payload not found')
          Path('/tmp/post4_apply.py').write_bytes(gzip.decompress(base64.b64decode(match.group(1))))
          PY
          python -m py_compile /tmp/post4_apply.py
          python /tmp/post4_apply.py
          rm -f .github/workflows/post4-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Implement v0.4.0.post4 acceptance remediation"
          git push origin HEAD:remediation/v0.4.0-post4
      - name: Remove temporary main workflow
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          git rm -f .github/workflows/post4-apply-main.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove temporary post4 applicator workflow"
          git push origin main
