name: temporary-release-audit-cleanup

on:
  push:
    branches: [ops/v0.4.0-release-audit-final]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete temporary audit branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/ops/v0.4.0-release-audit-final"
