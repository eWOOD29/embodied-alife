name: Post2 completion audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    if: github.event.pull_request.title == 'Audit v0.4.0.post2 completion'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post2
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Run authoritative validation and audit
        shell: bash
        run: |
          set -o pipefail
          : > post2-completion-evidence.txt
          record() { echo "$ $*" | tee -a post2-completion-evidence.txt; "$@" 2>&1 | tee -a post2-completion-evidence.txt; }
          record python -m pytest -q tests/test_v040_remediation.py
          record python -m pytest -q
          record python -m compileall -q app tests scripts
          record find app tests scripts -type d -name __pycache__ -prune -exec rm -rf '{}' +
          record rm -rf .pytest_cache .ruff_cache
          record find data/runtime -maxdepth 1 -type f ! -name .gitkeep -delete
          record python scripts/validate_package.py
          record python scripts/build_release.py --output dist/embodied-alife-update.zip
          record python - <<'PY'
          import hashlib, json, re, zipfile
          from pathlib import Path
          from packaging.version import Version
          import tomllib
          package = tomllib.loads(Path('pyproject.toml').read_text())['project']['version']
          ns = {}
          exec(Path('app/version.py').read_text(), ns)
          assert package == ns['__version__'] == '0.4.0.post2'
          assert Version(package) > Version('0.4.0.post1') > Version('0.4.0')
          archive = Path('dist/embodied-alife-update.zip')
          checksum = Path('dist/embodied-alife-update.zip.sha256').read_text().strip()
          m = re.fullmatch(r'([0-9a-f]{64})  (embodied-alife-update\.zip)', checksum)
          assert m
          assert hashlib.sha256(archive.read_bytes()).hexdigest() == m.group(1)
          with zipfile.ZipFile(archive) as z:
              assert z.testzip() is None
              names = z.namelist()
              assert len(names) == len(set(names))
              manifest = json.loads(z.read('update-manifest.json'))
              assert manifest['app_id'] == 'embodied-alife'
              assert manifest['version'] == '0.4.0.post2'
              assert manifest['preserved_roots'] == ['.env', '.venv', 'data', '.git']
              assert sorted(manifest['managed_paths']) == sorted(n for n in names if n != 'update-manifest.json')
              forbidden = ('post2_', 'post2-', 'validation-output', 'applicator', 'runner-output', '__pycache__', '.pytest_cache', '.ruff_cache')
              assert not [n for n in names if any(x in n.lower() for x in forbidden)]
              actions = z.read('app/simulation/actions.py').decode()
              assert '_strip_coordinate_fields' not in actions
              assert '_ari_marker_projection' in actions
              assert 'version = "0.4.0.post2"' in z.read('pyproject.toml').decode()
              assert '__version__ = "0.4.0.post2"' in z.read('app/version.py').decode()
              Path('post2-archive-members.txt').write_text('\n'.join(names) + '\n')
              Path('post2-manifest.json').write_text(json.dumps(manifest, indent=2) + '\n')
          print('VERSION_ORDER=PASS')
          print('ARCHIVE_AUDIT=PASS')
          print('ARCHIVE_SHA256=' + m.group(1))
          print('ARCHIVE_SIZE=' + str(archive.stat().st_size))
          print('ARCHIVE_ENTRIES=' + str(len(names)))
          PY
      - name: Post1 exact-branch negative control
        shell: bash
        run: |
          set -o pipefail
          git worktree add /tmp/post1 v0.4.0.post1
          cp tests/test_v040_remediation.py /tmp/post1/tests/test_v040_remediation.py
          set +e
          (cd /tmp/post1 && python -m pytest -q tests/test_v040_remediation.py::test_exact_marker_branch_uses_allowlist_and_preserves_observer_cognition) > post2-post1-negative-control.txt 2>&1
          status=$?
          set -e
          cat post2-post1-negative-control.txt
          echo "POST1_NEGATIVE_CONTROL_EXIT=$status" | tee -a post2-completion-evidence.txt
          test "$status" -ne 0
      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: post2-completion-evidence
          path: |
            post2-completion-evidence.txt
            post2-post1-negative-control.txt
            post2-archive-members.txt
            post2-manifest.json
            dist/embodied-alife-update.zip
            dist/embodied-alife-update.zip.sha256
