name: post5-apply-phase5

on:
  push:
    branches:
      - remediation/v0.4.0-post5
    paths:
      - scripts/post5_apply_phase5.py
      - .github/workflows/post5-apply-phase5.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post5
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Apply phase 5
        run: python scripts/post5_apply_phase5.py
      - name: Commit phase 5
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/diagnostics.py app/web/routes.py app/web/websocket.py app/storage/database.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Harden diagnostics REST and WebSocket boundaries"
            git push origin HEAD:remediation/v0.4.0-post5
          fi
