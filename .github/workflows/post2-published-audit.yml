name: Post2 published release audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    if: github.event.pull_request.title == 'Audit published v0.4.0.post2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - name: Download release metadata and assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p published-audit
          gh api repos/eWOOD29/embodied-alife/releases/tags/v0.4.0.post2 > published-audit/release.json
          gh api repos/eWOOD29/embodied-alife/releases/latest > published-audit/latest.json
          gh release download v0.4.0.post2 --dir published-audit --pattern 'embodied-alife-update.zip*'
      - name: Independently audit published bytes
        shell: bash
        run: |
          python - <<'PY'
          import hashlib, json, re, zipfile
          from pathlib import Path
          root = Path('published-audit')
          release = json.loads((root/'release.json').read_text())
          latest = json.loads((root/'latest.json').read_text())
          assert release['tag_name'] == 'v0.4.0.post2'
          assert release['draft'] is False and release['prerelease'] is False
          assert release['published_at']
          assert latest['tag_name'] == 'v0.4.0.post2'
          assets = {a['name']: a for a in release['assets']}
          zip_name = 'embodied-alife-update.zip'
          checksum_name = zip_name + '.sha256'
          assert set((zip_name, checksum_name)) <= set(assets)
          archive = root/zip_name
          checksum_text = (root/checksum_name).read_text()
          match = re.fullmatch(r'([0-9a-f]{64})  (embodied-alife-update\.zip)\n', checksum_text)
          assert match
          digest = hashlib.sha256(archive.read_bytes()).hexdigest()
          assert digest == match.group(1)
          with zipfile.ZipFile(archive) as z:
              assert z.testzip() is None
              names = z.namelist()
              assert len(names) == len(set(names))
              manifest = json.loads(z.read('update-manifest.json'))
              assert manifest['app_id'] == 'embodied-alife'
              assert manifest['version'] == '0.4.0.post2'
              assert manifest['preserved_roots'] == ['.env', '.venv', 'data', '.git']
              assert sorted(manifest['managed_paths']) == sorted(n for n in names if n != 'update-manifest.json')
              actions = z.read('app/simulation/actions.py').decode()
              assert '_ari_marker_projection' in actions
              assert '_strip_coordinate_fields' not in actions
              assert 'version = "0.4.0.post2"' in z.read('pyproject.toml').decode()
              assert '__version__ = "0.4.0.post2"' in z.read('app/version.py').decode()
              forbidden_names = ('post2_', 'post2-', 'validation-output', 'applicator', 'runner-output', '__pycache__', '.pytest_cache', '.ruff_cache', '.db', '.log')
              bad_names = [n for n in names if any(x in n.lower() for x in forbidden_names)]
              assert not bad_names, bad_names
              text_suffixes = ('.py','.md','.txt','.json','.toml','.yml','.yaml','.ps1','.bat','.example','.js','.html','.css')
              forbidden_content = ('c:\\users\\ethan', '/c/users/ethan', 'ethan-pc', 'tailce5cf1', 'docs.google.com/document/d/', 'ethan assistant system', 'post2-validation-output', 'post2_repair_applicator', 'post2_validation_applicator')
              content_hits=[]
              for name in names:
                  if name.lower().endswith(text_suffixes):
                      text=z.read(name).decode('utf-8','ignore').lower()
                      for marker in forbidden_content:
                          if marker in text:
                              content_hits.append([name,marker])
              assert not content_hits, content_hits
          report = {
              'release_id': release['id'], 'tag_name': release['tag_name'], 'target_commitish': release['target_commitish'],
              'published_at': release['published_at'], 'draft': release['draft'], 'prerelease': release['prerelease'],
              'latest_tag': latest['tag_name'], 'zip_asset': assets[zip_name], 'checksum_asset': assets[checksum_name],
              'checksum_contents': checksum_text, 'computed_sha256': digest, 'archive_size': archive.stat().st_size,
              'entry_count': len(names), 'manifest': manifest, 'bad_names': bad_names, 'content_hits': content_hits,
              'archive_members': names,
          }
          (root/'published-audit-report.json').write_text(json.dumps(report, indent=2)+'\n')
          print(json.dumps({k: report[k] for k in ('release_id','tag_name','published_at','draft','prerelease','latest_tag','computed_sha256','archive_size','entry_count')}, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: post2-published-release-audit
          path: published-audit
