name: v0.4.0.post1 final clean assets

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/v040-post1-final-clean-assets.yml
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  replace-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v0.4.0.post1
          fetch-depth: 0
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Prepare exact clean release workspace
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-list -n 1 v0.4.0.post1)" = "ab29544a6c2d606a63cab769c7368ac2019439ff"
          test "$(git rev-parse HEAD)" = "ab29544a6c2d606a63cab769c7368ac2019439ff"
          git clean -ffdx
          rm -f post1-test-output.txt
          rm -f tests/test_public_repository_hygiene.py
          test ! -e post1-test-output.txt
          test ! -e tests/test_public_repository_hygiene.py
      - name: Build and replace both assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_package.py
          python scripts/build_release.py --output dist/embodied-alife-update.zip
          gh release upload v0.4.0.post1 dist/embodied-alife-update.zip dist/embodied-alife-update.zip.sha256 --clobber
      - name: Redownload final published bytes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p final-published
          gh release download v0.4.0.post1 --pattern 'embodied-alife-update.zip' --pattern 'embodied-alife-update.zip.sha256' --dir final-published --clobber
          gh api repos/eWOOD29/embodied-alife/releases/358927957 > release-by-id.json
          gh api repos/eWOOD29/embodied-alife/releases/latest > latest-release.json
          git fetch origin main --depth=1
          git ls-tree -r --name-only origin/main > main-members.txt
      - name: Independently verify final assets
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json, re, tomllib, zipfile
          from pathlib import Path
          zp=Path('final-published/embodied-alife-update.zip')
          cp=Path('final-published/embodied-alife-update.zip.sha256')
          checksum=cp.read_text(encoding='utf-8')
          m=re.fullmatch(r'([0-9a-f]{64})  (embodied-alife-update\.zip)\n',checksum)
          assert m,checksum
          digest,filename=m.groups()
          computed=hashlib.sha256(zp.read_bytes()).hexdigest()
          assert digest==computed
          release=json.loads(Path('release-by-id.json').read_text())
          latest=json.loads(Path('latest-release.json').read_text())
          assert release['id']==358927957 and latest['id']==358927957
          assert release['tag_name']==latest['tag_name']=='v0.4.0.post1'
          assert release['target_commitish']=='ab29544a6c2d606a63cab769c7368ac2019439ff'
          assert release['draft'] is False and release['prerelease'] is False
          wanted={'embodied-alife-update.zip','embodied-alife-update.zip.sha256'}
          assets={a['name']:a for a in release['assets'] if a['name'] in wanted}
          latest_assets={a['name']:a for a in latest['assets'] if a['name'] in wanted}
          assert set(assets)==set(latest_assets)==wanted
          assert {n:assets[n]['id'] for n in wanted}=={n:latest_assets[n]['id'] for n in wanted}
          assert assets['embodied-alife-update.zip']['size']==zp.stat().st_size
          assert assets['embodied-alife-update.zip.sha256']['size']==cp.stat().st_size
          assert assets['embodied-alife-update.zip'].get('digest') in (None,f'sha256:{computed}')
          with zipfile.ZipFile(zp) as z:
              assert z.testzip() is None
              names=z.namelist()
              assert len(names)==len(set(names))
              manifest=json.loads(z.read('update-manifest.json'))
              assert manifest['app_id']=='embodied-alife'
              assert manifest['version']=='0.4.0.post1'
              assert manifest['preserved_roots']==['.env','.venv','data','.git']
              assert sorted(manifest['managed_paths'])==sorted(n for n in names if n!='update-manifest.json')
              required={'app/simulation/actions.py','app/simulation/agent.py','app/simulation/cognition.py','app/simulation/perception.py','app/simulation/scheduler.py','tests/test_v040_cognitive_foundations.py','tests/test_v040_remediation.py','docs/COGNITIVE_STATE.md','CHANGELOG.md','pyproject.toml','app/version.py'}
              assert required<=set(names)
              assert 'post1-test-output.txt' not in names
              assert 'tests/test_public_repository_hygiene.py' not in names
              forbidden_name_patterns=[r'(^|/)(?:post1|remediation|audit|ci|test)[-_].*output.*\.txt$',r'(^|/).*?(?:audit|diagnostic|applicator).*\.(?:txt|json|log|zip)$',r'(^|/)scripts/(?:apply|finalize|restore)_v040',r'(^|/)\.github/workflows/(?:v040|remediation|restore-v040|final-audit|republish)',r'(^|/)(?:__pycache__|\.pytest_cache|\.ruff_cache)(/|$)',r'(^|/).*\.(?:db|sqlite|sqlite3|pyc|log)$']
              forbidden=[n for n in names if any(re.search(p,n,re.I) for p in forbidden_name_patterns)]
              assert not forbidden,forbidden
              allowed_root={'.env.example','.gitignore','CHANGELOG.md','README.md','WINDOWS_SETUP.md','appdock.json','install-windows.ps1','pyproject.toml','start-embodied-alife.bat','start.sh','update-manifest.json'}
              unexpected=[n for n in names if '/' not in n and n not in allowed_root]
              assert not unexpected,unexpected
              pv=tomllib.loads(z.read('pyproject.toml').decode())['project']['version']
              vm=re.search(r'__version__\s*=\s*["\']([^"\']+)["\']',z.read('app/version.py').decode())
              assert vm and vm.group(1)==pv=='0.4.0.post1'
              privacy={
                'private_drive_url':re.compile(r'https://(?:docs|drive)\.google\.com/',re.I),
                'windows_user_path':re.compile(r'[A-Za-z]:\\Users\\[^\\\s]+',re.I),
                'private_unix_home':re.compile(r'/(?:home|Users)/(?:ethan|ewood29)(?:/|\\)',re.I),
                'private_tailnet':re.compile(r'(?:ethan-pc|tailce5cf1|100\.110\.245\.119)',re.I),
                'credential':re.compile(r'\b(?:sk-[A-Za-z0-9_-]{20,}|gh[pousr]_[A-Za-z0-9]{20,})\b'),
                'assistant_system':re.compile(r'Ethan Assistant System|Knowledge Vault|SKILL-PROJ-001',re.I),
              }
              hits=[]
              for name in names:
                  if name=='update-manifest.json' or name.endswith(('.png','.jpg','.jpeg','.gif','.ico','.zip')): continue
                  try:text=z.read(name).decode('utf-8')
                  except Exception:continue
                  for label,p in privacy.items():
                      if p.search(text):hits.append({'path':name,'pattern':label})
              assert not hits,hits
              Path('archive-members.txt').write_text('\n'.join(names)+'\n')
          main_names=Path('main-members.txt').read_text().splitlines()
          main_forbidden=[n for n in main_names if re.search(r'(^|/)(?:post1-test-output|remediation-.*output|.*audit.*report|scripts/(?:apply|finalize|restore)_v040|\.github/workflows/(?:v040|remediation|restore-v040|final-audit|republish))',n,re.I)]
          assert not main_forbidden,main_forbidden
          evidence={
            'version':'0.4.0.post1','tag':'v0.4.0.post1','tag_target':'ab29544a6c2d606a63cab769c7368ac2019439ff','release_id':release['id'],'published':bool(release['published_at']),'draft':release['draft'],'prerelease':release['prerelease'],
            'zip_asset':{k:assets['embodied-alife-update.zip'].get(k) for k in ('id','name','size','created_at','updated_at','digest','browser_download_url')},
            'checksum_asset':{k:assets['embodied-alife-update.zip.sha256'].get(k) for k in ('id','name','size','created_at','updated_at','digest','browser_download_url')},
            'checksum_file_contents':checksum,'computed_zip_sha256':computed,'checksum_filename':filename,'checksum_match':True,'zip_integrity':True,'entry_count':len(names),'manifest_path':'update-manifest.json','manifest':manifest,'managed_path_reconciliation':True,'corrected_files_present':True,'package_runtime_versions_synchronized':True,'post1_test_output_absent':True,'private_marker_fixture_absent':True,'other_temporary_files_absent':True,'privacy_hygiene_scan':True,'unexpected_root_level_members':[],'main_clean':True,'temporary_workflows_absent_from_main':True,'temporary_reports_absent_from_main':True,'temporary_applicators_absent_from_main':True,'latest_release_id':latest['id'],'latest_tag':latest['tag_name'],'latest_zip_url_exposed':bool(latest_assets['embodied-alife-update.zip']['browser_download_url']),'latest_checksum_url_exposed':bool(latest_assets['embodied-alife-update.zip.sha256']['browser_download_url']),'latest_asset_ids_match_release':True,'replacement_proven':True
          }
          Path('a12-final-evidence.json').write_text(json.dumps(evidence,indent=2)+'\n')
          PY
      - name: Upload durable external evidence
        uses: actions/upload-artifact@v4
        with:
          name: v040-post1-final-a12-evidence
          path: |
            a12-final-evidence.json
            archive-members.txt
            release-by-id.json
            latest-release.json
            final-published/embodied-alife-update.zip
            final-published/embodied-alife-update.zip.sha256
          retention-days: 90
      - name: Delete temporary cleanup branch
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X DELETE repos/eWOOD29/embodied-alife/git/refs/heads/operations/v040-post1-package-cleanup
