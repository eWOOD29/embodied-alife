name: post5-clean-temp

on:
  push:
    branches:
      - remediation/v0.4.0-post5
    paths:
      - .github/workflows/post5-clean-temp.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post5
          fetch-depth: 0
      - name: Remove temporary post5 infrastructure and outputs
        shell: bash
        run: |
          git rm -f --ignore-unmatch \
            scripts/post5_apply_phase1.py \
            scripts/post5_apply_phase2.py \
            scripts/post5_apply_phase3.py \
            scripts/post5_apply_phase4.py \
            scripts/post5_apply_phase5.py \
            scripts/post5_apply_phase6.py \
            scripts/post5_apply_phase7.py \
            scripts/post5_apply_phase8.py \
            scripts/post5_apply_phase9.py \
            scripts/post5_apply_phase10.py \
            scripts/post5_apply_phase11.py \
            scripts/post5_apply_phase12.py \
            .github/workflows/post5-apply-phase1.yml \
            .github/workflows/post5-apply-phase2.yml \
            .github/workflows/post5-apply-phase3.yml \
            .github/workflows/post5-apply-phase4.yml \
            .github/workflows/post5-apply-phase5.yml \
            .github/workflows/post5-apply-phase6.yml \
            .github/workflows/post5-apply-phase7.yml \
            .github/workflows/post5-apply-phase8.yml \
            .github/workflows/post5-apply-phase9.yml \
            .github/workflows/post5-apply-phase10.yml \
            .github/workflows/post5-apply-phase11.yml \
            .github/workflows/post5-apply-phase12.yml \
            .github/workflows/post5-test-probe.yml \
            .github/workflows/post5-validation-evidence.yml \
            .github/workflows/post5-clean-temp.yml \
            post5-test-output.txt \
            post5-compile-output.txt \
            post5-phase10-output.txt
      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove temporary post5 infrastructure and probe output" || exit 0
          git push origin HEAD:remediation/v0.4.0-post5
