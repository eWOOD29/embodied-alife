name: post5-apply-phase11

on:
  push:
    branches:
      - remediation/v0.4.0-post5
    paths:
      - scripts/post5_apply_phase11.py
      - .github/workflows/post5-apply-phase11.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post5
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python scripts/post5_apply_phase11.py
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/simulation/engine.py app/simulation/scheduler.py
          git commit -m "Bind recent view results to verified events" || exit 0
          git push origin HEAD:remediation/v0.4.0-post5
