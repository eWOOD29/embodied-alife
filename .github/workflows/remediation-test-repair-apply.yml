name: Apply v0.4.0 semantic test repairs

on:
  push:
    branches:
      - remediation/v0.4.0-post1
    paths:
      - scripts/apply_v040_test_repairs.py
      - .github/workflows/remediation-test-repair-apply.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post1
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python scripts/apply_v040_test_repairs.py
      - run: python -m compileall -q tests
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests
          git commit -m "Strengthen v0.4.0 semantic acceptance tests"
          git push origin HEAD:remediation/v0.4.0-post1
