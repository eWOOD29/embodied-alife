name: post4-cleanup

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/post4-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Delete temporary branches and workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for branch in audit/v0.4.0-post4 audit/v0.4.0-post4-final remediation/v0.4.0-post4; do
            git push origin --delete "$branch" 2>/dev/null || true
          done
          rm .github/workflows/post4-cleanup.yml
          git add .github/workflows/post4-cleanup.yml
          git commit -m "Remove temporary post4 cleanup workflow"
          git push origin HEAD:main
