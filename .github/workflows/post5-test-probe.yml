name: post5-test-probe

on:
  push:
    branches:
      - remediation/v0.4.0-post5
    paths:
      - .github/workflows/post5-test-probe.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post5
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Run probe
        shell: bash
        run: |
          set +e
          python -m pytest -q --maxfail=50 > post5-test-output.txt 2>&1
          pytest_status=$?
          python -m compileall -q app tests scripts > post5-compile-output.txt 2>&1
          compile_status=$?
          printf '\nPYTEST_EXIT=%s\nCOMPILE_EXIT=%s\n' "$pytest_status" "$compile_status" >> post5-test-output.txt
          cat post5-compile-output.txt >> post5-test-output.txt
          exit 0
      - name: Commit probe output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add post5-test-output.txt post5-compile-output.txt
          git commit -m "Record temporary post5 test probe" || exit 0
          git push origin HEAD:remediation/v0.4.0-post5
