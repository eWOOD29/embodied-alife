name: v0.4.0 remediation debug

on:
  push:
    branches:
      - remediation/v0.4.0-post1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post1
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Run focused remediation tests
        continue-on-error: true
        run: python -m pytest -q tests/test_v040_cognitive_foundations.py tests/test_v040_remediation.py > remediation-test-output.txt 2>&1
      - name: Run full suite
        continue-on-error: true
        run: python -m pytest -q > remediation-full-output.txt 2>&1
      - name: Commit exact output
        if: always()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f remediation-test-output.txt remediation-full-output.txt
          git commit -m "Record temporary remediation test output"
          git push origin HEAD:remediation/v0.4.0-post1
