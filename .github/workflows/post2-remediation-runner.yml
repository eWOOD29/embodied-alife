name: Post2 remediation runner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.title == 'Run v0.4.0.post2 remediation applicator'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: remediation/v0.4.0-post2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e '.[dev]'
      - name: Apply repair with failure capture
        shell: bash
        run: |
          set +e
          python scripts/post2_repair_applicator.py > post2-repair-output.txt 2>&1
          status=$?
          cat post2-repair-output.txt
          if [ "$status" -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Capture post2 repair failure" || true
            git push origin HEAD:remediation/v0.4.0-post2
            exit "$status"
          fi
