name: Post2 remediation runner

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'Run post2 remediation applicator'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: remediation/v0.4.0-post2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e '.[dev]'
      - run: python scripts/post2_remediation_applicator.py
