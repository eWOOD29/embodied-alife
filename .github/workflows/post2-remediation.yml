name: Post2 remediation

# Synchronization trigger for the temporary default-branch runner.
on:
  push:
    branches:
      - remediation/v0.4.0-post2

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'Add post2 remediation workflow'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: remediation/v0.4.0-post2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e '.[dev]'
      - run: python scripts/post2_remediation_applicator.py
