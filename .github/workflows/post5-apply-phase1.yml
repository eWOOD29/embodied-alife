name: post5-apply-phase1

on:
  push:
    branches:
      - remediation/v0.4.0-post5
    paths:
      - scripts/post5_apply_phase1.py
      - .github/workflows/post5-apply-phase1.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post5
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Apply phase 1
        run: python scripts/post5_apply_phase1.py
      - name: Commit phase 1
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/simulation/integrity.py app/simulation/cognition.py app/simulation/agent.py app/simulation/scheduler.py app/simulation/engine.py app/memory/consolidation.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Implement creation-path provenance foundation"
            git push origin HEAD:remediation/v0.4.0-post5
          fi
