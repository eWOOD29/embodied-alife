name: post5-apply-phase12

on:
  push:
    branches:
      - remediation/v0.4.0-post5
    paths:
      - scripts/post5_apply_phase12.py
      - .github/workflows/post5-apply-phase12.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post5
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python scripts/post5_apply_phase12.py
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/simulation/perception.py app/simulation/agent.py app/web/routes.py scripts/privacy_scan.py tests/test_public_repository_hygiene.py tests/test_v040_post4_remediation.py tests/test_v040_post5_remediation.py
          git commit -m "Close malformed-state and privacy scan regressions" || exit 0
          git push origin HEAD:remediation/v0.4.0-post5
