name: post6-source-export

on:
  push:
    branches:
      - agent/v0.4.0-post6-remediation

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/upload-artifact@v4
        with:
          name: post6-source
          path: .
          include-hidden-files: true
          retention-days: 1
