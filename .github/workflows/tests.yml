name: tests

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post3
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Generate audit
        run: python scripts/post3_preedit_audit.py
      - name: Commit audit evidence
        if: github.event_name == 'pull_request'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add post3-preedit-audit.txt
          git commit -m 'Capture post3 pre-edit audit evidence'
          git push origin HEAD:remediation/v0.4.0-post3
