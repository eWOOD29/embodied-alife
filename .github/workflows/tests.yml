name: tests

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post3
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Apply post3 remediation
        run: python scripts/apply_post3_remediation.py
      - name: Focused test
        id: focused
        continue-on-error: true
        run: python -m pytest -q tests/test_v040_post3_remediation.py tests/test_v040_remediation.py > post3-focused-output.txt 2>&1
      - name: Commit focused output
        if: github.event_name == 'pull_request'
        run: |
          git checkout -- app CHANGELOG.md
          rm -f tests/test_v040_post3_remediation.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add post3-focused-output.txt
          git commit -m 'Capture post3 focused validation output'
          git push origin HEAD:remediation/v0.4.0-post3
      - name: Fail when focused tests fail
        if: steps.focused.outcome == 'failure'
        run: exit 1
