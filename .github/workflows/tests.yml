name: tests

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-post4:
    runs-on: ubuntu-latest
    steps:
      - name: Apply temporary post4 payload when present
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'remediation/v0.4.0-post4'
        uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post4
          fetch-depth: 0
      - name: Decode, apply, and commit
        id: apply
        continue-on-error: true
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'remediation/v0.4.0-post4'
        shell: bash
        run: |
          set -o pipefail
          if grep -q '0.4.0.post4' app/version.py; then
            echo "Post4 payload already applied."
            exit 0
          fi
          python - <<'PY'
          import base64, gzip, re
          from pathlib import Path
          workflow = Path('.github/workflows/post4-apply.yml').read_text(encoding='utf-8')
          match = re.search(r'^\s*PAYLOAD:\s*(\S+)\s*$', workflow, re.MULTILINE)
          if not match:
              raise SystemExit('post4 payload not found')
          Path('/tmp/post4_apply.py').write_bytes(gzip.decompress(base64.b64decode(match.group(1))))
          PY
          python -m py_compile /tmp/post4_apply.py 2>&1 | tee /tmp/post4-apply.log
          python /tmp/post4_apply.py 2>&1 | tee -a /tmp/post4-apply.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Implement v0.4.0.post4 acceptance remediation"
          git push origin HEAD:remediation/v0.4.0-post4
      - name: Fail when applicator failed
        if: steps.apply.outcome == 'failure'
        run: exit 1
  test:
    needs: apply-post4
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Test
        run: python -m pytest -q
      - name: Compile
        run: python -m compileall -q app tests scripts
      - name: Clean generated validation files
        shell: bash
        run: |
          find app tests scripts -type d -name __pycache__ -prune -exec rm -rf {} +
          rm -rf .pytest_cache .ruff_cache
          find data/runtime -maxdepth 1 -type f ! -name .gitkeep -delete
      - name: Validate package
        run: python scripts/validate_package.py
