name: tests

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post3
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Apply post3 remediation
        run: python scripts/apply_post3_remediation.py
      - name: Focused test
        run: python -m pytest -q tests/test_v040_post3_remediation.py tests/test_v040_remediation.py
      - name: Test
        run: python -m pytest -q
      - name: Compile
        run: python -m compileall -q app tests scripts
      - name: Clean generated validation files
        shell: bash
        run: |
          find app tests scripts -type d -name __pycache__ -prune -exec rm -rf {} +
          rm -rf .pytest_cache .ruff_cache
          find data/runtime -maxdepth 1 -type f ! -name .gitkeep -delete
      - name: Validate package
        run: python scripts/validate_package.py
      - name: Commit clean tested candidate
        if: github.event_name == 'pull_request'
        run: |
          rm scripts/apply_post3_remediation.py .github/workflows/post3-remediation.yml
          git show origin/main:.github/workflows/tests.yml > .github/workflows/tests.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Implement bounded post3 cognition projections'
          git push origin HEAD:remediation/v0.4.0-post3
