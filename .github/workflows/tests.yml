name: tests

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Delete temporary branches and close audit PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git push origin --delete remediation/v0.4.0-post3 || true
          gh pr close 14 --comment 'Published-byte audit evidence was retrieved and retained as Actions artifact 8580958326. Closing without merge.'
          git push origin --delete audit/v0.4.0-post3-final || true
