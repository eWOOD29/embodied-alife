name: tests

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-post4:
    runs-on: ubuntu-latest
    steps:
      - name: Check out post4 remediation branch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'remediation/v0.4.0-post4'
        uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post4
          fetch-depth: 0
      - name: Apply final post4 patch and commit source only
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'remediation/v0.4.0-post4'
        shell: bash
        run: |
          set -euo pipefail
          if grep -q '0.4.0.post4' app/version.py; then
            echo "Post4 source already applied."
            exit 0
          fi
          test -f post4-final.patch.gz.b64
          base64 --decode post4-final.patch.gz.b64 | gzip --decompress > /tmp/post4-final.patch
          git apply --index --whitespace=error-all /tmp/post4-final.patch
          git rm -f post4-final.patch.gz.b64
          if git diff --cached --name-only | grep -q '^\.github/workflows/'; then
            echo "Refusing to push workflow changes from the temporary applicator."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --cached --check
          git commit -m "Implement v0.4.0.post4 acceptance remediation"
          git push origin HEAD:remediation/v0.4.0-post4
  test:
    needs: apply-post4
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Test
        run: python -m pytest -q
      - name: Compile
        run: python -m compileall -q app tests scripts
      - name: Clean generated validation files
        shell: bash
        run: |
          find app tests scripts -type d -name __pycache__ -prune -exec rm -rf {} +
          rm -rf .pytest_cache .ruff_cache
          find data/runtime -maxdepth 1 -type f ! -name .gitkeep -delete
      - name: Validate package
        run: python scripts/validate_package.py
