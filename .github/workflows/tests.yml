name: tests

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  capture-post4-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out post4 remediation branch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'remediation/v0.4.0-post4'
        uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post4
          fetch-depth: 0
      - name: Build candidate commit and attempt ref update
        id: build
        continue-on-error: true
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'remediation/v0.4.0-post4'
        shell: bash
        run: |
          set -o pipefail
          exec > >(tee post4-commit-output.log) 2>&1
          set -eux
          test -f post4-final.patch.gz.b64
          base64 --decode post4-final.patch.gz.b64 | gzip --decompress > /tmp/post4-final.patch
          git apply --index /tmp/post4-final.patch
          git rm -f post4-final.patch.gz.b64 post4-trigger.txt
          if git diff --cached --name-only | grep -q '^\.github/workflows/'; then
            echo "Refusing to include workflow changes in candidate commit."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --cached --check
          git commit -m "Implement v0.4.0.post4 acceptance remediation"
          {
            echo "commit=$(git rev-parse HEAD)"
            echo "tree=$(git rev-parse HEAD^{tree})"
            echo "parent=$(git rev-parse HEAD^)"
          } | tee post4-commit-identity.txt
          git push origin HEAD:remediation/v0.4.0-post4
      - name: Upload commit identity and push evidence
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'remediation/v0.4.0-post4'
        uses: actions/upload-artifact@v4
        with:
          name: post4-commit-identity
          path: |
            post4-commit-identity.txt
            post4-commit-output.log
          if-no-files-found: warn
      - name: Fail if candidate construction failed before identity capture
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'remediation/v0.4.0-post4'
        shell: bash
        run: test -f post4-commit-identity.txt
