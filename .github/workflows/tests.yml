name: tests

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-post4:
    runs-on: ubuntu-latest
    steps:
      - name: Check out post4 remediation branch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'remediation/v0.4.0-post4'
        uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post4
          fetch-depth: 0
      - name: Reconstruct, verify, apply, and push candidate
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'remediation/v0.4.0-post4'
        shell: bash
        run: |
          set -euxo pipefail
          cat post4-patch.part00 post4-patch.part01 post4-patch.part02 post4-patch.part03 post4-patch.part04 post4-patch.part05 post4-patch.part06 > /tmp/post4-final.patch.gz.b64
          test "$(git hash-object /tmp/post4-final.patch.gz.b64)" = "1f50ac47da4ad21843ae98b3e06750347912007f"
          base64 --decode /tmp/post4-final.patch.gz.b64 | gzip --decompress > /tmp/post4-final.patch
          git apply --index /tmp/post4-final.patch
          git rm -f post4-final.patch.gz.b64 post4-trigger.txt post4-patch.part00 post4-patch.part01 post4-patch.part02 post4-patch.part03 post4-patch.part04 post4-patch.part05 post4-patch.part06
          if git diff --cached --name-only | grep -q '^\.github/workflows/'; then
            echo "Refusing to include workflow changes in candidate commit."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --cached --check
          git commit -m "Implement v0.4.0.post4 acceptance remediation"
          git push origin HEAD:remediation/v0.4.0-post4
