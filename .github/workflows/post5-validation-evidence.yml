name: post5-validation-evidence

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Focused and full tests
        shell: bash
        run: |
          set +e
          python -m pytest -q tests/test_v040_post4_remediation.py tests/test_cognitive_state_foundations.py tests/test_prompt_policy.py > post5-focused.txt 2>&1
          focused=$?
          python -m pytest -q --maxfail=50 > post5-full.txt 2>&1
          full=$?
          printf 'focused_exit=%s\nfull_exit=%s\n' "$focused" "$full" > post5-status.txt
          cat post5-focused.txt
          cat post5-full.txt
          exit $(( focused != 0 || full != 0 ))
      - name: Compile
        if: always()
        run: python -m compileall -q app tests scripts > post5-compile.txt 2>&1 || true
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post5-validation-evidence
          path: |
            post5-focused.txt
            post5-full.txt
            post5-status.txt
            post5-compile.txt
          if-no-files-found: error
