name: Apply v0.4.0.post1 finalization

on:
  push:
    branches:
      - remediation/v0.4.0-post1
    paths:
      - scripts/finalize_v040_post1.py
      - .github/workflows/remediation-finalize-apply.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post1
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python scripts/finalize_v040_post1.py
      - run: |
          python - <<'PY'
          from packaging.version import Version
          assert Version('0.4.0.post1') > Version('0.4.0')
          from app.version import __version__
          assert __version__ == '0.4.0.post1'
          PY
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CHANGELOG.md docs/COGNITIVE_STATE.md pyproject.toml app/version.py
          git commit -m "Document and version v0.4.0.post1 remediation"
          git push origin HEAD:remediation/v0.4.0-post1
