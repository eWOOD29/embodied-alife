name: Post2 temporary branch cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.title == 'Cleanup v0.4.0.post2 temporary branches'
    runs-on: ubuntu-latest
    steps:
      - name: Delete temporary branches
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          for branch in \
            audit/v0.4.0-post2-completion \
            audit/v0.4.0-post2-published \
            remediation/v0.4.0-post2
          do
            encoded="${branch//\//%2F}"
            gh api -X DELETE "repos/eWOOD29/embodied-alife/git/refs/heads/${encoded}" || true
          done
