name: post4-apply

on:
  push:
    branches:
      - remediation/v0.4.0-post4
    paths:
      - .github/workflows/post4-apply.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      PAYLOAD: 
    steps:
      - uses: actions/checkout@v5
        with:
          ref: remediation/v0.4.0-post4
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Decode and apply
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$PAYLOAD" | base64 --decode | gzip --decompress > /tmp/post4_apply.py
          python -m py_compile /tmp/post4_apply.py
          python /tmp/post4_apply.py
          rm -f .github/workflows/post4-apply.yml
      - name: Commit candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Implement v0.4.0.post4 acceptance remediation"
          git push origin HEAD:remediation/v0.4.0-post4
