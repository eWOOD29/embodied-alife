name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "${GITHUB_REF_NAME}" = "v${PACKAGE_VERSION}"
      - name: Test
        run: python -m pytest -q
      - name: Compile and validate
        run: |
          python -m compileall -q app tests scripts
          python scripts/validate_package.py
      - name: Build update assets
        run: python scripts/build_release.py --output dist/embodied-alife-update.zip
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/embodied-alife-update.zip \
            dist/embodied-alife-update.zip.sha256 \
            --title "Embodied Artificial Life ${GITHUB_REF_NAME}" \
            --generate-notes
