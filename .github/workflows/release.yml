name: release

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml
      - app/version.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Resolve release version
        shell: bash
        run: |
          PACKAGE_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${PACKAGE_VERSION}" >> "$GITHUB_ENV"
      - name: Verify package versions match
        shell: bash
        run: |
          APP_VERSION="$(python -c 'from app.version import __version__; print(__version__)')"
          test "$APP_VERSION" = "$PACKAGE_VERSION"
      - name: Test
        run: python -m pytest -q
      - name: Compile
        run: python -m compileall -q app tests scripts
      - name: Clean generated validation files
        shell: bash
        run: |
          find app tests scripts -type d -name __pycache__ -prune -exec rm -rf {} +
          rm -rf .pytest_cache .ruff_cache
          find data/runtime -maxdepth 1 -type f ! -name .gitkeep -delete
      - name: Validate package
        run: python scripts/validate_package.py
      - name: Build update assets
        run: python scripts/build_release.py --output dist/embodied-alife-update.zip
      - name: Tag release commit
        shell: bash
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            TAG_SHA="$(git rev-list -n 1 "${RELEASE_TAG}" 2>/dev/null || true)"
            if [ -n "$TAG_SHA" ] && [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
              echo "${RELEASE_TAG} already points to a different commit" >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${RELEASE_TAG}" "$GITHUB_SHA"
            git push origin "${RELEASE_TAG}"
          fi
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" \
              dist/embodied-alife-update.zip \
              dist/embodied-alife-update.zip.sha256 \
              --clobber
            gh release edit "${RELEASE_TAG}" \
              --title "Embodied Artificial Life ${RELEASE_TAG}" \
              --latest
          else
            gh release create "${RELEASE_TAG}" \
              dist/embodied-alife-update.zip \
              dist/embodied-alife-update.zip.sha256 \
              --target "$GITHUB_SHA" \
              --title "Embodied Artificial Life ${RELEASE_TAG}" \
              --generate-notes \
              --latest
          fi
